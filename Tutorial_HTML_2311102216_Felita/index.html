<!DOCTYPE html>
<html>

<!--tidak terlihat langsung dihalaman-->
<head>
    <!--muncul di judul tab browser-->
    <title>Data Mahasiswa</title>

    <!--mengatur tampilan halaman-->
    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1{
            margin-bottom: 30px;
        }

        table{
            border-spacing: 0 15px;
        }

        td{
            vertical-align: top;
            font-size: 18px;
        }

        .label{
            width: 320px;
        }

        input[type=text]{
            width: 230px;
            padding: 5px;
        }

        input[type=date]{
            width: 190px;
            padding: 5px;
        }

        textarea{
            width: 250px;
            height: 90px;
        }

        select{
            width: 250px;
            padding: 5px;
        }

        .hobi label{
            display:block;
            margin-bottom:5px;
        }

        .button{
            margin-top:20px;
        }

        button{
            padding:6px 15px;
        }

    </style>

</head>
<body>

<!---->
<h1>Data Mahasiswa</h1>

<form>

<table>

<tr>
    <td class="label">NIM :</td>
    <td>
        <input type="text" name="nim">
    </td>
</tr>

<tr>
    <td class="label">Nama :</td>
    <td>
        <input type="text" name="nama">
    </td>
</tr>

<tr>
    <td class="label">Tgl Lahir (dd-mm-yyyy) :</td>
    <td>
        <input type="date" name="tgl_lahir">
    </td>
</tr>

<tr>
    <td class="label">Jenis Kelamin :</td>
    <td>
        <input type="radio" name="jk" value="L"> Laki-Laki

        <input type="radio" name="jk" value="P"> Perempuan
    </td>
</tr>

<tr>
    <td class="label">Alamat di Bandung :</td>
    <td>
        <textarea name="alamat"></textarea>
    </td>
</tr>

<tr>
    <td class="label">Tinggal di :</td>
    <td>
        <select name="tinggal">
            <option>--pilih--</option>
            <option>Kos/Kontrakan</option>
            <option>Rumah Saudara</option>
            <option>Rumah Orang Tua</option>
        </select>
    </td>
</tr>

<tr>
    <td class="label">Pilih 2 hobi yang paling disukai :</td>

    <td class="hobi">

        <label>
            <input type="checkbox" name="hobi[]" value="Science">
            Science
        </label>

        <label>
            <input type="checkbox" name="hobi[]" value="Technology">
            Technology
        </label>

        <label>
            <input type="checkbox" name="hobi[]" value="Art">
            Art
        </label>

        <label>
            <input type="checkbox" name="hobi[]" value="Sport">
            Sport
        </label>

    </td>
</tr>

<tr>
    <td></td>
    <td class="button">

        <button type="submit">
            Submit
        </button>

        <button type="reset">
            Reset
        </button>

    </td>
</tr>

</table>

</form>

</body>
</html>
